<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue Button Test</title>
  <style>
    body {
      display: flex;
      height: 100vh;
      margin: 0;
      align-items: center;
      justify-content: center;
      background-color: #f5f5f5;
      font-family: system-ui, sans-serif;
    }
    button {
      background-color: #0066ff;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    button:hover {
      background-color: #0052cc;
    }
    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <button>Click Me</button>
</body>
</html>
